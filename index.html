<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3賢者問答 - Gemini 3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">
    <h1 class="text-2xl font-bold mb-6 mt-4">3賢者問答</h1>
    <div class="w-full max-w-2xl bg-gray-800 p-6 rounded-lg shadow-xl">
        <textarea id="userInput" class="w-full h-32 p-4 bg-gray-700 text-white rounded mb-4" placeholder="問いを入力してください..."></textarea>
        <button onclick="askSages()" id="sendBtn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 rounded font-bold">問答を始める</button>
    </div>
    <div id="response" class="w-full max-w-2xl mt-8 space-y-4"></div>

    <script>
        async function askSages() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const resDiv = document.getElementById('response');
            if (!input) return;

            btn.disabled = true;
            btn.innerText = "賢者が思索中...";
            resDiv.innerHTML = "<p class='text-center'>（しばらくお待ちください...）</p>";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                const data = await response.json();
                // Geminiのレスポンス形式に合わせて表示
                const text = data.candidates[0].content.parts[0].text;
                resDiv.innerHTML = `<div class='bg-gray-800 p-6 rounded shadow-lg'>\${text.replace(/\\n/g, '<br>')}</div>`;
            } catch (e) {
                resDiv.innerHTML = "<p class='text-red-500'>通信エラーが発生しました。設定を確認してください。</p>";
            } finally {
                btn.disabled = false;
                btn.innerText = "問答を始める";
            }
        }
    </script>
</body>
</html>
