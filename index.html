<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三賢者問答 - 宿命の対話</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .sage-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-gray-200 min-h-screen p-4 flex flex-col items-center">
    <header class="text-center my-8">
        <h1 class="text-4xl font-serif font-bold text-amber-500 mb-2">三賢者問答</h1>
        <p class="text-sm text-gray-400">織田信長 × レフ・トルストイ × 親鸞聖人</p>
    </header>

    <main class="w-full max-w-3xl space-y-6">
        <div class="bg-black/50 p-6 rounded-2xl border border-amber-900/30">
            <textarea id="userInput" class="w-full h-32 p-4 bg-gray-900 border border-gray-700 rounded-xl focus:border-amber-500 outline-none" placeholder="貴方の苦悩や問いをここへ..."></textarea>
            <button onclick="askSages()" id="sendBtn" class="w-full mt-4 py-4 bg-amber-700 hover:bg-amber-600 rounded-xl font-bold transition-all text-white">問答を開始する</button>
        </div>
        <div id="response" class="space-y-4"></div>
    </main>

    <script>
        async function askSages() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const resDiv = document.getElementById('response');
            if (!input) return;

            btn.disabled = true;
            btn.innerText = "賢者たちが思索しております...";
            resDiv.innerHTML = "<div class='text-center py-10 animate-pulse text-amber-200'>満天の星の下、三人が言葉を交わしています...</div>";

            const prompt = `あなたは「織田信長」「レフ・トルストイ」「親鸞」の三人の賢者として、以下の問いに答えてください。
            問い：${input}
            形式：
            【織田信長】（激情と決断、破壊の先の平和を語る）
            【トルストイ】（非暴力、民衆の苦しみ、愛を語る）
            【親鸞】（他力本願、阿弥陀の慈悲、凡夫の救いを語る）
            最後に【住職の気づき】として、仏教的なまとめを書いてください。`;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                resDiv.innerHTML = `<div class='sage-card p-8 rounded-2xl leading-relaxed whitespace-pre-wrap'>\${text}</div>`;
            } catch (e) {
                resDiv.innerHTML = "<div class='text-red-500 text-center p-4 bg-red-900/20 rounded'>通信の糸が途切れました。もう一度お試しください。</div>";
            } finally {
                btn.disabled = false;
                btn.innerText = "問答を開始する";
            }
        }
    </script>
</body>
</html>
