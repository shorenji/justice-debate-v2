<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三賢者問答</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #d1d5db; font-family: "Sawarabi Mincho", serif; }
        .sage-box { background: rgba(255, 255, 255, 0.05); border: 1px solid #444; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
    <h1 class="text-3xl font-bold text-amber-600 my-10">三賢者問答</h1>
    <div class="w-full max-w-2xl bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-2xl">
        <textarea id="userInput" class="w-full h-40 p-4 bg-black border border-gray-700 rounded-lg focus:border-amber-500 outline-none text-white" placeholder="問いを入力してください..."></textarea>
        <button onclick="askSages()" id="sendBtn" class="w-full mt-4 py-4 bg-amber-800 hover:bg-amber-700 rounded-lg font-bold transition-all">問答を始める</button>
    </div>
    <div id="response" class="w-full max-w-2xl mt-8"></div>

    <script>
        async function askSages() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const resDiv = document.getElementById('response');
            if (!input) return;

            btn.disabled = true;
            btn.innerText = "賢者が思索しております...";
            resDiv.innerHTML = "<div class='text-center animate-pulse text-amber-200'>満天の星の下、対話が始まりました...</div>";

            const prompt = `あなたは「織田信長」「レフ・トルストイ」「親鸞」の三人の賢者として、以下の問いに答えてください。
            問い：${input}
            形式：
            【織田信長】（激情と決断を語る）
            【トルストイ】（非暴力と愛を語る）
            【親鸞】（慈悲と救いを語る）
            最後に【住職の気づき】を書いてください。`;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                resDiv.innerHTML = `<div class='sage-box p-8 rounded-xl leading-relaxed whitespace-pre-wrap'>\${text}</div>`;
            } catch (e) {
                resDiv.innerHTML = "<div class='text-red-500 text-center p-4 bg-red-900/20 rounded'>通信の糸が途切れました。もう一度お試しください。</div>";
            } finally {
                btn.disabled = false;
                btn.innerText = "問答を始める";
            }
        }
    </script>
</body>
</html>
